<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Sky Army Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--accent:#38bdf8;
--text:#e5e7eb;
--muted:#9ca3af;
--bg:#020617;
--panel:#0f172a;
--border:rgba(148,163,184,0.25);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:radial-gradient(circle at top,#1e293b 0,#020617 60%,#000 100%);
color:var(--text);
font-family:system-ui;
padding:20px;
display:flex;
justify-content:center;
}

.shell{
width:100%;
max-width:1100px;
background:var(--panel);
border-radius:20px;
border:1px solid var(--border);
box-shadow:0 20px 60px rgba(0,0,0,0.7);
overflow:hidden;
}

.shell-inner{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
padding:20px;
}

@media(max-width:850px){
.shell-inner{grid-template-columns:1fr}
}

.sidebar{
background:#020617;
border-radius:14px;
padding:16px;
border:1px solid var(--border);
}

.stat{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.main{
display:flex;
flex-direction:column;
gap:16px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

@media(max-width:700px){
.cards{grid-template-columns:1fr}
}

.card{
background:#020617;
border-radius:14px;
padding:14px;
border:1px solid var(--border);
}

.card-value{
font-size:24px;
font-weight:700;
}

.panel{
background:#020617;
border-radius:14px;
padding:14px;
border:1px solid var(--border);
}

.log-body{
max-height:200px;
overflow:auto;
font-family:monospace;
font-size:12px;
}

.log-entry{
border-bottom:1px solid #111827;
padding:3px 0;
color:#9ca3af;
}

canvas{
width:100% !important;
height:240px !important;
}

button{
border-radius:999px;
border:1px solid var(--border);
background:#020617;
color:white;
padding:5px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="shell">
<div class="shell-inner">

<!-- 사이드 -->
<div class="sidebar">

<h3>Sky Army Bot</h3>
<br>

<div class="stat">
<span>서버</span>
<span id="stat-guilds">0</span>
</div>

<div class="stat">
<span>인증 유저</span>
<span id="stat-verified">0</span>
</div>

<div class="stat">
<span>경고</span>
<span id="stat-warns">0</span>
</div>

</div>

<!-- 메인 -->
<div class="main">

<div style="display:flex;justify-content:space-between;">
<h2>SKYBOT STATUS</h2>
<button onclick="refreshAll()">새로고침</button>
</div>

<!-- 카드 -->
<div class="cards">

<div class="card">
<div>서버 수</div>
<div class="card-value" id="card-guilds">0</div>
</div>

<div class="card">
<div>인증된 유저</div>
<div class="card-value" id="card-verified">0</div>
</div>

<div class="card">
<div>경고 기록</div>
<div class="card-value" id="card-warns">0</div>
</div>

</div>

<!-- 그래프 -->
<div class="panel">
<h3>경제 그래프</h3>
<canvas id="ecoChart"></canvas>
</div>

<!-- 로그 -->
<div class="panel">
<h3>최근 에러 로그</h3>
<div class="log-body" id="log-body"></div>
</div>

</div>
</div>
</div>

<script>

const STATS="/api/stats"
const ERRORS="/api/errors"
const GRAPH="/api/economy/graph"

let chart

async function fetchJSON(url){
const r=await fetch(url,{cache:"no-store"})
if(!r.ok)throw new Error(r.status)
return r.json()
}

function animateNumber(id,target){
const el=document.getElementById(id)
let start=0
let duration=700
let startTime=Date.now()

function update(){
let p=Math.min((Date.now()-startTime)/duration,1)
let value=Math.floor(start+(target-start)*p)
el.textContent=value
if(p<1)requestAnimationFrame(update)
}
update()
}

function setLogs(logs){

const body=document.getElementById("log-body")

if(!logs.length){
body.innerHTML="<div class='log-entry'>에러 없음</div>"
return
}

body.innerHTML=logs.map(l=>`
<div class="log-entry">[${l.timestamp}] ${l.message}</div>
`).join("")
}

function updateGraph(data){

const labels=data.map(d=>d.time)
const values=data.map(d=>d.total)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("ecoChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"총 돈",
data:values,
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
tension:0.3
}]
},
options:{
animation:{
duration:1200
},
plugins:{
legend:{display:false}
},
scales:{
y:{beginAtZero:true}
}
}
})
}

async function refreshAll(){

try{

const stats=await fetchJSON(STATS)
const errors=await fetchJSON(ERRORS).catch(()=>[])
const graph=await fetchJSON(GRAPH).catch(()=>[])

animateNumber("stat-guilds",stats.guilds||0)
animateNumber("stat-verified",stats.verified_users||0)
animateNumber("stat-warns",stats.warn_records||0)

animateNumber("card-guilds",stats.guilds||0)
animateNumber("card-verified",stats.verified_users||0)
animateNumber("card-warns",stats.warn_records||0)

setLogs(errors)

if(graph.length) updateGraph(graph)

}catch(e){
console.error(e)
}

}

refreshAll()
setInterval(refreshAll,60000)

</script>

</body>
  </html>
